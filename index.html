<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 역사·전통 과학 AR 체험 - 조선의 다리미 '인두'</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f7f6f2;
            overflow: hidden;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            --poster-color: transparent;
        }

        /* 상단 교육용 안내 카드 */
        .edu-banner {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 16px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(140, 98, 57, 0.15);
            border: 1px solid rgba(140, 98, 57, 0.2);
            text-align: center;
            width: 88%;
            max-width: 420px;
            z-index: 100;
        }
        .edu-banner h1 {
            margin: 0 0 6px 0;
            font-size: 1.25rem;
            color: #5c3f21;
            font-weight: bold;
        }
        .edu-banner p {
            margin: 0;
            font-size: 0.88rem;
            color: #444;
            line-height: 1.45;
            word-break: keep-all;
        }

        /* 화면 최상단 고정 AR 버튼 */
        .ar-activate-btn {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #8c6239; 
            color: #ffffff !important;
            border: none;
            border-radius: 30px;
            padding: 18px 40px;
            font-size: 1.15rem;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.35);
            cursor: pointer;
            z-index: 9999 !important;
            display: block !important;
            visibility: visible !important;
            white-space: nowrap;
            text-align: center;
        }
        .ar-activate-btn:active {
            background-color: #5c3f21;
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <div class="edu-banner">
        <h1>🔍 AR로 만나는 조상의 지혜: '인두'</h1>
        <p>화로에 달구어 한복의 깃이나 동정처럼 좁은 구석을 다리던 옛날 다리미입니다. 교실 바닥이나 책상에 직접 띄워 관찰해 보세요!</p>
    </div>

    <model-viewer 
        id="viewer"
        src="https://raw.githubusercontent.com/kwon-dev/3d-models/main/indu.glb"
        alt="조선시대 전통 다리미 인두 3D 모델"
        ar 
        ar-modes="scene-viewer quick-look webxr" 
        camera-controls 
        touch-action="none"
        shadow-intensity="1.5"
        auto-rotate>
    </model-viewer>

    <button class="ar-activate-btn" id="custom-ar-button">
        ✨ 교실 책상에 인두 띄우기 (AR)
    </button>

    <script>
        document.getElementById('custom-ar-button').addEventListener('click', () => {
            const viewer = document.getElementById('viewer');
            if (viewer) {
                viewer.activateAR();
            }
        });
    </script>
</body>
</html>
