<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 역사·전통 과학 AR 체험 - 조선의 다리미 '인두'</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f7f6f2;
            overflow: hidden;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
            --poster-color: transparent;
        }

        /* 상단 교육용 안내 카드 */
        .edu-banner {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(5px);
            padding: 16px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(140, 98, 57, 0.15);
            border: 1px solid rgba(140, 98, 57, 0.2);
            text-align: center;
            width: 88%;
            max-width: 420px;
            z-index: 10;
        }
        .edu-banner h1 {
            margin: 0 0 6px 0;
            font-size: 1.25rem;
            color: #5c3f21;
            font-weight: bold;
        }
        .edu-banner p {
            margin: 0;
            font-size: 0.88rem;
            color: #444;
            line-height: 1.45;
            word-break: keep-all;
        }

        /* 📌 어떤 상황에서도 화면에 강제로 띄우는 AR 버튼 스타일 */
        .ar-activate-btn {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #8c6239; 
            color: #ffffff;
            border: none;
            border-radius: 30px;
            padding: 16px 36px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 999; /* 최상단에 배치 */
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .ar-activate-btn:active {
            background-color: #5c3f21;
            transform: translateX(-50%) scale(0.96);
        }

        /* 로딩 바 */
        .progress-bar {
            display: block;
            width: 33%;
            height: 4px;
            background: rgba(0, 0, 0, 0.2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 2px;
            overflow: hidden;
        }
        .update-bar {
            width: 0%;
            height: 100%;
            background: #8c6239;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="edu-banner">
        <h1>🔍 AR로 만나는 조상의 지혜: '인두'</h1>
        <p>화로에 달구어 한복의 깃이나 동정처럼 좁은 구석을 다리던 옛날 다리미입니다. 교실 바닥이나 책상에 직접 띄워 관찰해 보세요!</p>
    </div>

    <model-viewer 
        id="viewer"
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
        ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
        alt="조선시대 전통 다리미 인두 3D 모델"
        ar 
        ar-modes="scene-viewer quick-look webxr" 
        camera-controls 
        touch-action="none"
        shadow-intensity="1.5"
        shadow-softness="1"
        environment-image="neutral"
        exposure="1.2">
        
        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
        </div>
    </model-viewer>

    <button class="ar-activate-btn" id="custom-ar-button">
        ✨ 교실 책상에 인두 띄우기 (AR)
    </button>

    <script>
        // 로딩바 제어
        const onProgress = (event) => {
            const progressBar = event.target.querySelector('.update-bar');
            if(progressBar) {
                progressBar.style.width = `${event.detail.totalProgress * 100}%`;
            }
        };
        document.getElementById('viewer').addEventListener('progress', onProgress);

        // 📌 버튼을 누르면 기기의 AR 기능을 강제로 실행시키는 스크립트
        document.getElementById('custom-ar-button').addEventListener('click', () => {
            const viewer = document.getElementById('viewer');
            if (viewer.canActivateAR) {
                viewer.activateAR(); // AR 카메라 강제 구동
            } else {
                alert("현재 브라우저/기기는 AR 기능을 지원하지 않습니다. 안드로이드는 Chrome, 아이폰은 Safari 앱으로 다시 접속해 주세요!");
            }
        });
    </script>
</body>
</html>
